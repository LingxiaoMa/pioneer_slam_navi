teleop_twist_joy_node:
  ros__parameters:
    # Hold L1 to enable movement (deadman switch — release = stop)
    require_enable_button: true
    enable_button: 1          # L1
    enable_turbo_button: 9    # R1 — hold for turbo speed

    axis_linear:
      x: 1                    # left stick Y → forward/back
    scale_linear:
      x: 0.5                  # m/s at full stick deflection (normal)
    scale_linear_turbo:
      x: 1.0                  # m/s at full stick deflection (turbo)

    axis_angular:
      yaw: 0                  # left stick X → turn left/right
    scale_angular:
      yaw: 1.0                # rad/s at full stick deflection (normal)
    scale_angular_turbo:
      yaw: 1.5                # rad/s at full stick deflection (turbo)
